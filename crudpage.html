<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database Management | UDverse</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #050a18; --card-bg: rgba(16, 25, 46, 0.9); --accent-blue: #00d4ff; --border-color: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--bg-color); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .form-container { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); width: 100%; max-width: 600px; }
        
        .header-box { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logout-btn { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 5px 15px; border-radius: 50px; cursor: pointer; width: auto; font-size: 12px; }
        .logout-btn:hover { background: #ff4d4d; color: white; }

        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border-color); color: white; border-radius: 8px; box-sizing: border-box; }
        input[type="file"] { background: transparent; border: 1px dashed var(--accent-blue); cursor: pointer; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        .save-btn { background: var(--accent-blue); color: #050a18; }
        #cancel-btn { background: #334155; color: white; display: none; }
        
        .back-link { margin-top: 20px; color: var(--accent-blue); text-decoration: none; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; margin-top: 5px; border-radius: 5px; }
        
        .action-btns { display: flex; gap: 10px; }
        .edit-btn { background: var(--accent-blue); color: #050a18; padding: 5px 12px; width: auto; font-size: 12px; }
        .del-btn { background: #ff4d4d; color: white; padding: 5px 12px; width: auto; font-size: 12px; }
        label { font-size: 0.9rem; color: var(--accent-blue); display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="header-box">
            <h2 id="form-title" style="color:var(--accent-blue); margin: 0;">Add New Character</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <input type="hidden" id="edit-id">

        <input type="text" id="name" placeholder="Name">
        <input type="text" id="subtitle" placeholder="Subtitle">
        
        <label>Character Image (Leave blank to keep current if editing):</label>
        <input type="file" id="image-file" accept="image/*">
        
        <input type="text" id="s1" placeholder="Stat 1 (Origin)">
        <input type="text" id="s2" placeholder="Stat 2 (Hobby)">
        <input type="text" id="s3" placeholder="Stat 3 (House)">
        <textarea id="desc" placeholder="Character Biography" rows="4"></textarea>
        
        <button class="save-btn" id="submit-btn" onclick="handleSubmit()">Add to Database</button>
        <button id="cancel-btn" onclick="resetForm()">Cancel Edit</button>
        
        <hr style="border:0; border-top:1px solid var(--border-color); margin: 20px 0;">
        
        <h3>Existing Characters</h3>
        <div id="edit-list">Connecting to neural link...</div>
    </div>
    <a href="charlist.html" class="back-link">← Back to Archive</a>

    <script>
        const supabaseUrl = 'https://qamxewtxqpjnanfnukyf.supabase.co';
        const supabaseKey = 'sb_publishable_P1xM99HgR3CHIeOn8VRrlw_4DwYmDeG'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let isEditing = false;

        // --- SECURITY CHECK ---
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            } else {
                loadList();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }

        // --- LOAD LIST ---
        async function loadList() {
            const listDiv = document.getElementById('edit-list');
            const { data, error } = await supabaseClient
                .from('characters')
                .select('*')
                .order('name', { ascending: true });

            if (error) {
                listDiv.innerHTML = "Error loading database.";
                return;
            }

            listDiv.innerHTML = '';
            if (data.length === 0) listDiv.innerHTML = "No records found.";

            data.forEach((c) => {
                // We stringify the object so we can pass it to the prepareEdit function
                const charData = JSON.stringify(c).replace(/'/g, "&apos;");
                listDiv.innerHTML += `
                    <div class="list-item">
                        <span>${c.name}</span>
                        <div class="action-btns">
                            <button class="edit-btn" onclick='prepareEdit(${charData})'>Edit</button>
                            <button class="del-btn" onclick="deleteChar('${c.id}')">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- PREPARE EDIT ---
        function prepareEdit(character) {
            isEditing = true;
            document.getElementById('edit-id').value = character.id;
            document.getElementById('name').value = character.name;
            document.getElementById('subtitle').value = character.subtitle;
            document.getElementById('s1').value = character.s1;
            document.getElementById('s2').value = character.s2;
            document.getElementById('s3').value = character.s3;
            document.getElementById('desc').value = character.desc;

            document.getElementById('form-title').innerText = "Edit Character";
            document.getElementById('submit-btn').innerText = "Update Record";
            document.getElementById('cancel-btn').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- RESET FORM ---
        function resetForm() {
            isEditing = false;
            document.getElementById('edit-id').value = '';
            document.getElementById('name').value = '';
            document.getElementById('subtitle').value = '';
            document.getElementById('s1').value = '';
            document.getElementById('s2').value = '';
            document.getElementById('s3').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('image-file').value = '';

            document.getElementById('form-title').innerText = "Add New Character";
            document.getElementById('submit-btn').innerText = "Add to Database";
            document.getElementById('cancel-btn').style.display = "none";
        }

        // --- SUBMIT HANDLER ---
        async function handleSubmit() {
            const btn = document.getElementById('submit-btn');
            const fileInput = document.getElementById('image-file');
            const file = fileInput.files[0];

            if (!isEditing && !file) {
                alert("Please select an image for new characters!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                let publicUrl = null;

                // If a new file is selected, upload it
                if (file) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}.${fileExt}`;
                    const { error: upError } = await supabaseClient.storage
                        .from('character-images')
                        .upload(fileName, file);
                    
                    if (upError) throw upError;

                    const { data: urlData } = supabaseClient.storage
                        .from('character-images')
                        .getPublicUrl(fileName);
                    publicUrl = urlData.publicUrl;
                }

                const charData = {
                    name: document.getElementById('name').value,
                    subtitle: document.getElementById('subtitle').value,
                    s1: document.getElementById('s1').value,
                    s2: document.getElementById('s2').value,
                    s3: document.getElementById('s3').value,
                    desc: document.getElementById('desc').value
                };

                if (publicUrl) charData.img = publicUrl;

                if (isEditing) {
                    // UPDATE EXISTING
                    const id = document.getElementById('edit-id').value;
                    const { error } = await supabaseClient.from('characters').update(charData).eq('id', id);
                    if (error) throw error;
                    alert("Neural Link Updated!");
                } else {
                    // INSERT NEW
                    const { error } = await supabaseClient.from('characters').insert([charData]);
                    if (error) throw error;
                    alert("Character Synced to Archive!");
                }

                resetForm();
                loadList();
            } catch (err) {
                alert("Operation failed: " + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        // --- DELETE ---
        async function deleteChar(id) {
            if (!confirm("Are you sure you want to delete this character?")) return;

            const { data: charData } = await supabaseClient.from('characters').select('img').eq('id', id).single();

            const { error: tableError } = await supabaseClient.from('characters').delete().eq('id', id);

            if (tableError) {
                alert("Delete failed: " + tableError.message);
                return;
            }

            if (charData && charData.img) {
                const filePath = charData.img.split('/').pop();
                await supabaseClient.storage.from('character-images').remove([filePath]);
            }

            alert("Character purged.");
            loadList();
        }

        checkSession();
    </script>
</body>
</html>
