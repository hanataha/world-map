<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UDverse | Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #050a18; --accent-blue: #00d4ff; }
        body { background: var(--bg-color); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(16, 25, 46, 0.9); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 50px; border: none; background: var(--accent-blue); color: #050a18; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color:var(--accent-blue)">Admin Portal</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Access System</button>
        <p id="msg" style="font-size:12px; color:#ff4d4d"></p>
    </div>

    <script>
        const supabaseUrl = 'https://qamxewtxqpjnanfnukyf.supabase.co';
        const supabaseKey = 'sb_publishable_P1xM99HgR3CHIeOn8VRrlw_4DwYmDeG'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                document.getElementById('msg').innerText = error.message;
            } else {
                // Redirect to the management page on success
                window.location.href = "crudpage.html";
            }
        }
    </script>
</body>
</html>
