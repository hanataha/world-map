<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDverse World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(149, 165, 166, 0.2); 
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('Cherokee.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: -1px;
            margin: 0 0 0.5rem 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #cbd5e1;
            font-weight: 300;
            font-size: 1.1rem;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            gap: 2rem;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .icon {
            font-size: 3.5rem;
        }

        .card h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .card p {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.5;
            margin: 0;
        }

        @media (max-width: 680px) {
            .container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            body {
                height: auto;
                padding: 3rem 1rem;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>UDverse World</h1>
        <p class="subtitle">Welcome to the UDverse World</p>
    </header>

    <main class="container">
        <a href="map.html" class="card">
            <div class="icon">🌍</div>
            <h2>Interactive Map</h2>
            <p>Explore the world visually.</p>
        </a>

        <a href="kurs.html" class="card">
            <div class="icon">💱</div>
            <h2>Currency</h2>
            <p>Currency comparison viewer.</p>
        </a>

        <a href="charlist.html" class="card">
            <div class="icon">👤</div>
            <h2>Character List</h2>
            <p>View all characters in the archive.</p>
        </a>

        <a href="blank.html" class="card">
            <div class="icon">⏳</div>
            <h2>Coming soon</h2>
            <p>Stay tuned for more features!</p>
        </a>
    </main>

</body>
</html>
