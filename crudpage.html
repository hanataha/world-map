<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database Management</title>
    <!-- 1. SUPABASE LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #050a18; --card-bg: rgba(16, 25, 46, 0.9); --accent-blue: #00d4ff; --border-color: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--bg-color); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .form-container { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); width: 100%; max-width: 600px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border-color); color: white; border-radius: 8px; box-sizing: border-box; }
        input[type="file"] { background: transparent; border: 1px dashed var(--accent-blue); cursor: pointer; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .save-btn { background: var(--accent-blue); color: #050a18; }
        .back-link { margin-top: 20px; color: var(--accent-blue); text-decoration: none; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; margin-top: 5px; border-radius: 5px; }
        .del-btn { background: #ff4d4d; color: white; padding: 5px 10px; width: auto; font-size: 12px; }
        label { font-size: 0.9rem; color: var(--accent-blue); display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 style="color:var(--accent-blue)">Add New Character</h2>
        
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="subtitle" placeholder="Subtitle">
        
        <label>Character Image:</label>
        <input type="file" id="image-file" accept="image/*">
        
        <input type="text" id="s1" placeholder="Stat 1 (Origin)">
        <input type="text" id="s2" placeholder="Stat 2 (Hobby)">
        <input type="text" id="s3" placeholder="Stat 3 (House)">
        <textarea id="desc" placeholder="Character Biography"></textarea>
        
        <button class="save-btn" id="submit-btn" onclick="addChar()">Add to Database</button>
        
        <hr style="border:0; border-top:1px solid var(--border-color); margin: 20px 0;">
        
        <h3>Existing Characters</h3>
        <div id="edit-list">Loading characters...</div>
    </div>
    <a href="charlist.html" class="back-link">← Back to Archive</a>

    <script>
        // 2. SUPABASE CONNECTION
        const supabaseUrl = 'https://qamxewtxqpjnanfnukyf.supabase.co';
        const supabaseKey = 'sb_publishable_P1xM99HgR3CHIeOn8VRrlw_4DwYmDeG'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // 3. LOAD CHARACTERS FROM CLOUD
        async function loadList() {
            const listDiv = document.getElementById('edit-list');
            const { data, error } = await supabaseClient
                .from('characters')
                .select('id, name')
                .order('name', { ascending: true });

            if (error) {
                listDiv.innerHTML = "Error loading database.";
                return;
            }

            listDiv.innerHTML = '';
            if (data.length === 0) listDiv.innerHTML = "No characters found.";

            data.forEach((c) => {
                listDiv.innerHTML += `
                    <div class="list-item">
                        <span>${c.name}</span>
                        <button class="del-btn" onclick="deleteChar('${c.id}')">Delete</button>
                    </div>
                `;
            });
        }

        // 4. UPLOAD IMAGE AND ADD CHARACTER
        async function addChar() {
            const btn = document.getElementById('submit-btn');
            const fileInput = document.getElementById('image-file');
            const file = fileInput.files[0];

            // Validate inputs
            if (!file) {
                alert("Please select an image file!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Uploading Image...";

            try {
                // A. Create a unique filename to avoid overwriting
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.floor(Math.random() * 1000)}.${fileExt}`;

                // B. Upload file to Storage Bucket
                const { data: uploadData, error: uploadError } = await supabaseClient
                    .storage
                    .from('character-images')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // C. Get the Public URL
                const { data: urlData } = supabaseClient
                    .storage
                    .from('character-images')
                    .getPublicUrl(fileName);

                const publicUrl = urlData.publicUrl;

                // D. Insert record into Table
                btn.innerText = "Saving Record...";
                const newChar = {
                    name: document.getElementById('name').value,
                    subtitle: document.getElementById('subtitle').value,
                    img: publicUrl,
                    s1: document.getElementById('s1').value,
                    s2: document.getElementById('s2').value,
                    s3: document.getElementById('s3').value,
                    desc: document.getElementById('desc').value
                };

                const { error: dbError } = await supabaseClient
                    .from('characters')
                    .insert([newChar]);

                if (dbError) throw dbError;

                location.reload();

            } catch (err) {
                alert("Process failed: " + err.message);
                btn.disabled = false;
                btn.innerText = "Add to Database";
            }
        }

        // 5. DELETE FROM CLOUD
        async function deleteChar(id) {
            if (!confirm("Are you sure you want to delete this character?")) return;

            const { error } = await supabaseClient
                .from('characters')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Delete failed: " + error.message);
            } else {
                loadList();
            }
        }

        loadList();
    </script>
</body>
</html>
