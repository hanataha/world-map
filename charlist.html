<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Archive | List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #050a18;
            --card-bg: rgba(16, 25, 46, 0.7);
            --accent-blue: #00d4ff;
            --text-main: #e0e6ed;
            --border-color: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Search Bar Styling */
        .search-container { width: 100%; max-width: 1000px; margin-bottom: 30px; }
        #search-input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid var(--border-color); 
            background: rgba(255,255,255,0.05); 
            color: white; 
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        #search-input:focus { border-color: var(--accent-blue); }

        h1 { background: linear-gradient(90deg, #fff, var(--accent-blue)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .char-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .char-card:hover { transform: translateY(-10px); border-color: var(--accent-blue); }
        .char-img { width: 100%; height: 200px; object-fit: cover; }
        .char-info { padding: 20px; text-align: center; }
        
        .crud-link { background: var(--accent-blue); color: #050a18; padding: 10px 20px; border-radius: 12px; text-decoration: none; font-weight: bold; }
    
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 8px 16px;
            background-color: rgba(15, 23, 42, 0.8);
            color: #22d3ee;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            z-index: 100;
        }

        .back-btn:hover {
            background-color: #22d3ee;
            color: #020617;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        }

        .back-btn::before { content: '«'; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Character Archive</h1>
        <a href="crudpage.html" class="crud-link">Manage Database</a>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search neural link by name or subtitle..." onkeyup="filterCharacters()">
    </div>

    <div class="grid" id="char-grid">
        <p style="color:var(--accent-blue)">Connecting to neural network...</p>
    </div>

    <script>
        const supabaseUrl = 'https://qamxewtxqpjnanfnukyf.supabase.co';
        const supabaseKey = 'sb_publishable_P1xM99HgR3CHIeOn8VRrlw_4DwYmDeG'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const grid = document.getElementById('char-grid');

        // 1. Fetch data from Supabase
        async function fetchCharacters() {
            try {
                const { data, error } = await supabaseClient
                    .from('characters')
                    .select('*');

                if (error) throw error;

                grid.innerHTML = ''; 

                if (!data || data.length === 0) {
                    grid.innerHTML = `<p style="color:var(--accent-blue)">No characters found in the cloud database.</p>`;
                    return;
                }

                data.forEach((char) => {
                    grid.innerHTML += `
                        <a href="profile.html?id=${char.id}" class="char-card">
                            <img src="${char.img}" class="char-img" onerror="this.src='https://via.placeholder.com/250x200?text=No+Image'">
                            <div class="char-info">
                                <h3 class="char-name" style="margin:0">${char.name}</h3>
                                <small class="char-subtitle" style="color:var(--accent-blue)">${char.subtitle}</small>
                            </div>
                        </a>
                    `;
                });
            } catch (err) {
                console.error('Fetch error:', err);
                grid.innerHTML = `<p style="color:#ff4d4d">Error: ${err.message || err}</p>`;
            }
        }

        // 2. Search filtering logic
        function filterCharacters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.char-card');

            cards.forEach(card => {
                const name = card.querySelector('.char-name').innerText.toLowerCase();
                const subtitle = card.querySelector('.char-subtitle').innerText.toLowerCase();

                // Show card if name or subtitle matches search term
                if (name.includes(searchTerm) || subtitle.includes(searchTerm)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

        fetchCharacters();
    </script>

    <a href="index.html" class="back-btn">Back to UDverse Home</a>
</body>
</html>
