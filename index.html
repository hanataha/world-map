<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDverse World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(30, 41, 59, 0.3);
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- HORIZONTAL SLIDING BACKGROUND --- */
        .slider-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 500%; /* 5 images = 500% width */
            height: 100%;
            display: flex;
            z-index: -2;
            animation: slideSide 60s infinite ease-in-out alternate;
        }

        .slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        /* Assign your 5 images here */
        .img1 { background-image: url('nusantara.jpeg'); }
        .img2 { background-image: url('Adiwerna.jpeg'); }
        .img3 { background-image: url('Cherokee.jpeg'); }
        .img4 { background-image: url('Onderland.jpeg'); }
        .img5 { background-image: url('champa.jpeg'); }

        @keyframes slideSide {
            /* Forward Path (1 to 5) */
            0%, 10%    { transform: translateX(0%); }     /* Image 1 */
            12%, 22%   { transform: translateX(-20%); }   /* Image 2 */
            24%, 34%   { transform: translateX(-40%); }   /* Image 3 */
            36%, 46%   { transform: translateX(-60%); }   /* Image 4 */
            48%, 58%   { transform: translateX(-80%); }   /* Image 5 */

            /* Reverse Path (5 to 1) */
            60%, 70%   { transform: translateX(-60%); }   /* Image 4 */
            72%, 82%   { transform: translateX(-40%); }   /* Image 3 */
            84%, 94%   { transform: translateX(-20%); }   /* Image 2 */
            96%, 100%  { transform: translateX(0%); }     /* Image 1 */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: -1px;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #cbd5e1;
            font-weight: 300;
            font-size: 1.1rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            gap: 2rem;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.6);
        }

        .icon { font-size: 3.5rem; }
        .card h2 { margin: 0; font-size: 1.5rem; }
        .card p { font-size: 0.95rem; color: #94a3b8; line-height: 1.5; margin: 0; }

        @media (max-width: 680px) {
            .container { grid-template-columns: 1fr; }
            body { height: auto; padding: 3rem 1rem; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <!-- This div is a long strip containing all 5 images -->
    <div class="slider-wrapper">
        <div class="slide img1"></div>
        <div class="slide img2"></div>
        <div class="slide img3"></div>
        <div class="slide img4"></div>
        <div class="slide img5"></div>
    </div>
    
    <div class="overlay"></div>

    <header>
        <h1>UDverse World</h1>
        <p class="subtitle">Welcome to the UDverse World</p>
    </header>

    <main class="container">
        <a href="map.html" class="card">
            <div class="icon">🌍</div>
            <h2>Interactive Map</h2>
            <p>Explore the world visually.</p>
        </a>

        <a href="kurs.html" class="card">
            <div class="icon">💱</div>
            <h2>Currency</h2>
            <p>Currency comparison viewer.</p>
        </a>
    </main>

</body>
</html>
